name: Build, publish and deploy API with Blue-Green

on:
  workflow_call:
    inputs:
      image-name:
        description: Docker Hub image name without the user/organization prefix.
        required: true
        type: string
      image-tag:
        description: Version tag to publish and deploy.
        required: true
        type: string
      k3s-server-public-ip:
        description: Public IP or DNS name of the EC2 host running K3s.
        required: true
        type: string
      k8s-namespace:
        description: Kubernetes namespace where the API will be deployed.
        required: false
        type: string
        default: default
      app-name:
        description: Kubernetes app label and Service base name.
        required: false
        type: string
        default: demo-api
      health-path:
        description: HTTP path used by the pipeline and probes to validate health.
        required: false
        type: string
        default: /health
      live-node-port:
        description: NodePort exposed by the live Service.
        required: false
        type: string
        default: "30090"
      preview-node-port:
        description: NodePort exposed by the preview Service.
        required: false
        type: string
        default: "30091"
      k8s-manifests-dir:
        description: Directory containing Kubernetes manifests in the caller repository.
        required: false
        type: string
        default: k8s
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      EA2_SSH_PRIVATE_KEY:
        required: true

permissions:
  contents: read

jobs:
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run automated tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and publish versioned image
        env:
          IMAGE_REPO: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -euo pipefail
          docker build -t "${IMAGE_REPO}:${IMAGE_TAG}" -t "${IMAGE_REPO}:latest" .
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"
          docker push "${IMAGE_REPO}:latest"

  deploy-to-k8s:
    name: Deploy to K3s with Blue-Green
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ inputs.app-name }}
      HEALTH_PATH: ${{ inputs.health-path }}
      IMAGE_FULL: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
      K3S_HOST: ubuntu@${{ inputs.k3s-server-public-ip }}
      K8S_NAMESPACE: ${{ inputs.k8s-namespace }}
      LIVE_NODE_PORT: ${{ inputs.live-node-port }}
      MANIFEST_DIR: ${{ inputs.k8s-manifests-dir }}
      PREVIEW_NODE_PORT: ${{ inputs.preview-node-port }}
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EA2_SSH_PRIVATE_KEY }}

      - name: Check SSH access
        run: ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" 'echo ok'

      - name: Checkout Kubernetes manifests
        uses: actions/checkout@v4

      - name: Select inactive Blue-Green slot
        run: |
          set -euo pipefail
          CURRENT_SLOT="$(ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} get service ${APP_NAME} -o jsonpath='{.spec.selector.slot}' 2>/dev/null || true")"

          if [ -z "${CURRENT_SLOT}" ]; then
            CURRENT_SLOT="blue"
          fi

          if [ "${CURRENT_SLOT}" = "blue" ]; then
            TARGET_SLOT="green"
          else
            TARGET_SLOT="blue"
          fi

          {
            echo "PREVIOUS_SLOT=${CURRENT_SLOT}"
            echo "TARGET_SLOT=${TARGET_SLOT}"
          } >> "${GITHUB_ENV}"

          echo "Live slot: ${CURRENT_SLOT}"
          echo "Candidate slot: ${TARGET_SLOT}"

      - name: Render Kubernetes manifests
        run: |
          set -euo pipefail
          test -d "${MANIFEST_DIR}" || { echo "::error::Missing ${MANIFEST_DIR}/ in repository root"; exit 1; }

          rm -rf rendered-k8s
          mkdir -p rendered-k8s

          for file in "${MANIFEST_DIR}"/*.yaml; do
            [ -e "${file}" ] || continue
            SLOT="${TARGET_SLOT}" IMAGE="${IMAGE_FULL}" perl -pe 's/\$\{SLOT\}/$ENV{SLOT}/g; s/\$\{IMAGE\}/$ENV{IMAGE}/g' "${file}" > "rendered-k8s/$(basename "${file}")"
          done

          cat > rendered-k8s/service-preview.yaml <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}-preview
            labels:
              app: ${APP_NAME}
              role: preview
          spec:
            type: NodePort
            selector:
              app: ${APP_NAME}
              slot: ${TARGET_SLOT}
            ports:
              - name: http
                port: 3000
                targetPort: http
                nodePort: ${PREVIEW_NODE_PORT}
          EOF

          cat > rendered-k8s/service-live-bootstrap.yaml <<EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            labels:
              app: ${APP_NAME}
              role: live
          spec:
            type: NodePort
            selector:
              app: ${APP_NAME}
              slot: ${PREVIOUS_SLOT}
            ports:
              - name: http
                port: 3000
                targetPort: http
                nodePort: ${LIVE_NODE_PORT}
          EOF

          test "$(find rendered-k8s -type f | wc -l)" -gt 0 || { echo "::error::No YAML manifests found in ${MANIFEST_DIR}/"; exit 1; }
          if grep -R '\${' rendered-k8s; then
            echo "::error::Unresolved template variables remain in rendered manifests"
            exit 1
          fi

      - name: Apply candidate deployment and preview service
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" 'sudo rm -rf /tmp/k8s-deploy && mkdir -p /tmp/k8s-deploy && sudo chown ubuntu:ubuntu /tmp/k8s-deploy'
          scp -o StrictHostKeyChecking=accept-new -r rendered-k8s/. "${K3S_HOST}:/tmp/k8s-deploy/"
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl get namespace ${K8S_NAMESPACE} >/dev/null 2>&1 || sudo k3s kubectl create namespace ${K8S_NAMESPACE}"
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} apply -f /tmp/k8s-deploy/deployment.yaml"
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} apply -f /tmp/k8s-deploy/service-preview.yaml"
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} get service ${APP_NAME} >/dev/null 2>&1 || sudo k3s kubectl -n ${K8S_NAMESPACE} apply -f /tmp/k8s-deploy/service-live-bootstrap.yaml"

      - name: Wait for candidate rollout
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} rollout status deployment/${APP_NAME}-${TARGET_SLOT} --timeout=90s"

      - name: Validate preview health
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "bash -lc 'for i in {1..12}; do curl -fsS --max-time 5 http://127.0.0.1:${PREVIEW_NODE_PORT}${HEALTH_PATH} && exit 0; sleep 5; done; exit 1'"

      - name: Promote candidate to live traffic
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} patch service ${APP_NAME} --type merge -p '{\"spec\":{\"selector\":{\"app\":\"${APP_NAME}\",\"slot\":\"${TARGET_SLOT}\"}}}'"

      - name: Validate live health after promotion
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "bash -lc 'for i in {1..12}; do curl -fsS --max-time 5 http://127.0.0.1:${LIVE_NODE_PORT}${HEALTH_PATH} && exit 0; sleep 5; done; exit 1'"

      - name: Automatic rollback on failure
        if: failure()
        run: |
          set +e
          echo "::warning::Deployment failed. Restoring live Service selector to ${PREVIOUS_SLOT:-blue}."
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} patch service ${APP_NAME} --type merge -p '{\"spec\":{\"selector\":{\"app\":\"${APP_NAME}\",\"slot\":\"${PREVIOUS_SLOT:-blue}\"}}}'"
          ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} rollout undo deployment/${APP_NAME}-${TARGET_SLOT:-green} || true"

      - name: Show final Kubernetes state
        if: always()
        run: ssh -o StrictHostKeyChecking=accept-new "${K3S_HOST}" "sudo k3s kubectl -n ${K8S_NAMESPACE} get deployments,services,pods -l app=${APP_NAME} -o wide"
